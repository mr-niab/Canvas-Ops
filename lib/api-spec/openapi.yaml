openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Auth
    description: Authentication and current user.
  - name: Organisation
    description: The signed-in user's organisation.
  - name: Members
    description: Members and invites for the current organisation.
  - name: Teams
    description: Teams within the organisation.
  - name: Teammates
    description: Teammates within the organisation.
  - name: Projects
    description: Projects.
  - name: Tasks
    description: Workflow tasks.
  - name: Stakeholders
    description: Project stakeholders.
  - name: LogEntries
    description: Activity log entries.
  - name: Evidence
    description: Project evidence (files and linked boards) persistence.
  - name: Actions
    description: Personal "My actions today" items, scoped per user.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Account created and signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid request body or email already in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Sign out the current session
      responses:
        '204':
          description: Signed out.
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the currently signed-in user
      responses:
        '200':
          description: The signed-in user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/accept-invite:
    post:
      tags: [Auth]
      operationId: acceptInvite
      summary: Accept an invite token and sign in
      description: |
        Creates a user account (or reuses an existing one) using the invite
        token and joins the inviting organisation. The session is established
        on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        '200':
          description: Invite accepted; user signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid request body or email mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Existing user supplied the wrong password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Invite not found or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /organisation:
    get:
      tags: [Organisation]
      operationId: getOrganisation
      summary: Get the current user's organisation
      responses:
        '200':
          description: The organisation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Organisation]
      operationId: updateOrganisation
      summary: Rename the organisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganisationRequest'
      responses:
        '200':
          description: The updated organisation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not an owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /organisation/members:
    get:
      tags: [Members]
      operationId: listMembers
      summary: List members of the current organisation
      responses:
        '200':
          description: The organisation's members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /organisation/members/{userId}:
    delete:
      tags: [Members]
      operationId: removeMember
      summary: Remove a member from the organisation
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed.
        '400':
          description: Cannot remove this member (e.g. last owner, or self).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not an owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Member not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /organisation/invites:
    get:
      tags: [Members]
      operationId: listInvites
      summary: List pending invites for the organisation
      responses:
        '200':
          description: Pending (unaccepted, unexpired) invites.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invite'
        '403':
          description: Not an owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Members]
      operationId: createInvite
      summary: Invite an email address to the organisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteRequest'
      responses:
        '200':
          description: Invite created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '400':
          description: Invalid request body or already a member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not an owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /organisation/invites/{inviteId}:
    delete:
      tags: [Members]
      operationId: cancelInvite
      summary: Cancel a pending invite
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Invite cancelled.
        '403':
          description: Not an owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Invite not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /teams:
    get:
      tags: [Teams]
      operationId: listTeams
      summary: List teams
      responses:
        '200':
          description: All teams for the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Teams]
      operationId: createTeam
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '200':
          description: The created team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/{teamId}:
    patch:
      tags: [Teams]
      operationId: updateTeam
      summary: Rename or update a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: The updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Teams]
      operationId: deleteTeam
      summary: Delete a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Team deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teams/{teamId}/members/{teammateId}:
    post:
      tags: [Teams]
      operationId: addTeamMember
      summary: Add a teammate to a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
        - name: teammateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Teams]
      operationId: removeTeamMember
      summary: Remove a teammate from a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
        - name: teammateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /teammates:
    get:
      tags: [Teammates]
      operationId: listTeammates
      summary: List teammates
      responses:
        '200':
          description: All teammates.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Teammate'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Teammates]
      operationId: createTeammate
      summary: Add a teammate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeammateRequest'
      responses:
        '200':
          description: The created teammate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Teammate'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /teammates/{teammateId}:
    patch:
      tags: [Teammates]
      operationId: updateTeammate
      summary: Update a teammate
      parameters:
        - name: teammateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeammateRequest'
      responses:
        '200':
          description: The updated teammate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Teammate'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Teammates]
      operationId: deleteTeammate
      summary: Delete a teammate
      parameters:
        - name: teammateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Teammate deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects
      responses:
        '200':
          description: All projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: The created project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{projectId}:
    patch:
      tags: [Projects]
      operationId: updateProject
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: The updated project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Project deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /tasks:
    get:
      tags: [Tasks]
      operationId: listTasks
      summary: List tasks
      responses:
        '200':
          description: All tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Tasks]
      operationId: createTask
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '200':
          description: The full task list after creation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tasks/{taskId}:
    patch:
      tags: [Tasks]
      operationId: updateTask
      summary: Update a task (title, status, discipline, dependencies)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: The full task list after update.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Tasks]
      operationId: deleteTask
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The full task list after deletion.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /tasks/{taskId}/move:
    post:
      tags: [Tasks]
      operationId: moveTask
      summary: Move a task to a discipline + position
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
      responses:
        '200':
          description: The full task list after the move.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /stakeholders:
    get:
      tags: [Stakeholders]
      operationId: listStakeholders
      summary: List stakeholders
      responses:
        '200':
          description: All stakeholders.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Stakeholder'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Stakeholders]
      operationId: createStakeholder
      summary: Add a stakeholder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStakeholderRequest'
      responses:
        '200':
          description: The created stakeholder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stakeholder'

  /stakeholders/{stakeholderId}:
    patch:
      tags: [Stakeholders]
      operationId: updateStakeholder
      summary: Update a stakeholder
      parameters:
        - name: stakeholderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStakeholderRequest'
      responses:
        '200':
          description: The updated stakeholder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stakeholder'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Stakeholders]
      operationId: deleteStakeholder
      summary: Delete a stakeholder
      parameters:
        - name: stakeholderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /log-entries:
    get:
      tags: [LogEntries]
      operationId: listLogEntries
      summary: List log entries (newest first)
      responses:
        '200':
          description: All log entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [LogEntries]
      operationId: createLogEntry
      summary: Add a log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogEntryRequest'
      responses:
        '200':
          description: The created log entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogEntry'

  /log-entries/{logEntryId}:
    delete:
      tags: [LogEntries]
      operationId: deleteLogEntry
      summary: Delete a log entry
      parameters:
        - name: logEntryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /actions:
    get:
      tags: [Actions]
      operationId: listActions
      summary: List the signed-in user's personal actions
      responses:
        '200':
          description: The user's actions, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Action'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Actions]
      operationId: createAction
      summary: Add a personal action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRequest'
      responses:
        '200':
          description: The created action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /actions/{actionId}:
    patch:
      tags: [Actions]
      operationId: updateAction
      summary: Update a personal action
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionRequest'
      responses:
        '200':
          description: The updated action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
        '400':
          description: Invalid request body or empty title.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Actions]
      operationId: deleteAction
      summary: Delete a personal action
      parameters:
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Action deleted.
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not signed in.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /projects/{projectId}/evidence:
    get:
      tags: [Evidence]
      operationId: listProjectEvidence
      summary: List files and linked boards for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence for the project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEvidence'
        '500':
          description: Failed to load evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{projectId}/evidence/files:
    post:
      tags: [Evidence]
      operationId: createEvidenceFile
      summary: Persist metadata for an uploaded evidence file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvidenceFileRequest'
      responses:
        '200':
          description: Evidence file persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceFile'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to persist file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{projectId}/evidence/files/{fileId}:
    delete:
      tags: [Evidence]
      operationId: deleteEvidenceFile
      summary: Delete a previously uploaded evidence file
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Evidence file deleted.
        '404':
          description: Evidence file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to delete file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{projectId}/evidence/boards:
    post:
      tags: [Evidence]
      operationId: createLinkedBoard
      summary: Link a Miro or FigJam board to a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkedBoardRequest'
      responses:
        '200':
          description: Linked board persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedBoard'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to persist board.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /projects/{projectId}/evidence/boards/{boardId}:
    delete:
      tags: [Evidence]
      operationId: deleteLinkedBoard
      summary: Remove a linked board from a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: boardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Linked board deleted.
        '404':
          description: Linked board not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to delete board.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AuthUser:
      type: object
      required: [id, email, name, role, organisationId]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/MembershipRole'
        organisationId:
          type: string
          description: The organisation the user is currently acting on behalf of.

    MembershipRole:
      type: string
      enum: [owner, member]
    Member:
      type: object
      required: [userId, email, name, role, joinedAt]
      properties:
        userId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/MembershipRole'
        joinedAt:
          type: string
          format: date-time
    Invite:
      type: object
      required: [id, email, role, invitedBy, createdAt, expiresAt]
      properties:
        id:
          type: string
          description: The invite token. Doubles as the invite identifier.
        email:
          type: string
        role:
          $ref: '#/components/schemas/MembershipRole'
        invitedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
    CreateInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          minLength: 3
        role:
          $ref: '#/components/schemas/MembershipRole'
    AcceptInviteRequest:
      type: object
      required: [token, email, name, password]
      properties:
        token:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 3
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8
        name:
          type: string
          minLength: 1
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 1

    Organisation:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    UpdateOrganisationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    Team:
      type: object
      required: [id, name, description, teammateIds]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        teammateIds:
          type: array
          items:
            type: string
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    Teammate:
      type: object
      required: [id, name, email, role, teamIds]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        teamIds:
          type: array
          items:
            type: string
    CreateTeammateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        role:
          type: string
        teamIds:
          type: array
          items:
            type: string
    UpdateTeammateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        role:
          type: string

    Project:
      type: object
      required: [id, name, meta, stage, stageClass, status, statusClass]
      properties:
        id:
          type: string
        name:
          type: string
        meta:
          type: string
        stage:
          type: string
          enum: [Intake, Discovery, Alpha, Beta, Live]
        stageClass:
          type: string
        status:
          type: string
        statusClass:
          type: string
        teamId:
          type: string
          nullable: true
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        meta:
          type: string
        stage:
          type: string
          enum: [Intake, Discovery, Alpha, Beta, Live]
        teamId:
          type: string
          nullable: true
    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        meta:
          type: string
        stage:
          type: string
          enum: [Intake, Discovery, Alpha, Beta, Live]
        teamId:
          type: string
          nullable: true

    Task:
      type: object
      required: [id, discipline, title, status, dependencies]
      properties:
        id:
          type: string
        discipline:
          type: string
          enum: ['UX/UI Design', 'User Research', 'Service Design']
        title:
          type: string
        status:
          type: string
        previousStatus:
          type: string
          nullable: true
        dependencies:
          type: array
          items:
            type: string
    CreateTaskRequest:
      type: object
      required: [discipline, title]
      properties:
        discipline:
          type: string
          enum: ['UX/UI Design', 'User Research', 'Service Design']
        title:
          type: string
          minLength: 1
        status:
          type: string
        dependencies:
          type: array
          items:
            type: string
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
        discipline:
          type: string
          enum: ['UX/UI Design', 'User Research', 'Service Design']
        dependencies:
          type: array
          items:
            type: string
    MoveTaskRequest:
      type: object
      required: [discipline, targetIndex]
      properties:
        discipline:
          type: string
          enum: ['UX/UI Design', 'User Research', 'Service Design']
        targetIndex:
          type: integer
          minimum: 0

    Stakeholder:
      type: object
      required: [id, name, role, email, lastContacted, status, statusClass]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        email:
          type: string
        lastContacted:
          type: string
        status:
          type: string
        statusClass:
          type: string
    CreateStakeholderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
        email:
          type: string
        lastContacted:
          type: string
        status:
          type: string
        statusClass:
          type: string
    UpdateStakeholderRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
        email:
          type: string
        lastContacted:
          type: string
        status:
          type: string
        statusClass:
          type: string

    LogEntry:
      type: object
      required: [id, date, actor, type, typeClass, detail]
      properties:
        id:
          type: string
        date:
          type: string
        actor:
          type: string
        type:
          type: string
        typeClass:
          type: string
        detail:
          type: string
    CreateLogEntryRequest:
      type: object
      required: [date, actor, type, typeClass, detail]
      properties:
        date:
          type: string
          minLength: 1
        actor:
          type: string
          minLength: 1
        type:
          type: string
          minLength: 1
        typeClass:
          type: string
          minLength: 1
        detail:
          type: string
          minLength: 1

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file.
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    EvidenceFile:
      type: object
      required: [id, projectId, name, mimeType, size, addedBy, addedAt, objectPath]
      properties:
        id:
          type: string
        projectId:
          type: string
        name:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        objectPath:
          type: string
          description: Normalized server object path used to fetch the stored file.
        previewUrl:
          type: string
          description: Public URL the browser can use to preview/download the file.
    CreateEvidenceFileRequest:
      type: object
      required: [name, mimeType, size, addedBy, objectPath]
      properties:
        name:
          type: string
          minLength: 1
        mimeType:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 0
        addedBy:
          type: string
          minLength: 1
        objectPath:
          type: string
          minLength: 1
          description: Normalized object path returned by the upload-url endpoint.
    LinkedBoard:
      type: object
      required: [id, projectId, provider, url, embedUrl, title, linkedBy, linkedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        provider:
          type: string
          enum: [miro, figjam]
        url:
          type: string
        embedUrl:
          type: string
        title:
          type: string
        linkedBy:
          type: string
        linkedAt:
          type: string
          format: date-time
    CreateLinkedBoardRequest:
      type: object
      required: [provider, url, embedUrl, title, linkedBy]
      properties:
        provider:
          type: string
          enum: [miro, figjam]
        url:
          type: string
          minLength: 1
        embedUrl:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        linkedBy:
          type: string
          minLength: 1
    ProjectEvidence:
      type: object
      required: [files, boards]
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceFile'
        boards:
          type: array
          items:
            $ref: '#/components/schemas/LinkedBoard'

    Action:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateActionRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        note:
          type: string
          nullable: true
    UpdateActionRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        note:
          type: string
          nullable: true
